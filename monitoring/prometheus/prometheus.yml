global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: adk-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - backend:3000

  - job_name: adk-prometheus
    static_configs:
      - targets:
          - prometheus:9090
