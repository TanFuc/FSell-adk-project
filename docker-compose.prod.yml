version: '3.8'

x-backend-build: &backend_build
  context: ./backend
  dockerfile: Dockerfile
  cache_from:
    - type=local,src=.docker-cache/backend
  cache_to:
    - type=local,dest=.docker-cache/backend,mode=max

x-frontend-build: &frontend_build
  context: ./frontend
  dockerfile: Dockerfile
  cache_from:
    - type=local,src=.docker-cache/frontend
  cache_to:
    - type=local,dest=.docker-cache/frontend,mode=max

services:
  postgres:
    image: postgres:16-alpine
    container_name: adk-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-adk_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adk_network

  redis:
    image: redis:7-alpine
    container_name: adk-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: >
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adk_network

  backend:
    build: *backend_build
    container_name: adk-backend-prod
    restart: on-failure:5
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-adk_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-https://your-frontend-domain.com}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      R2_REGION: ${R2_REGION:-auto}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_KEY: ${R2_KEY}
      R2_SECRET: ${R2_SECRET}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      IMAGE_MAX_WIDTH: ${IMAGE_MAX_WIDTH:-2560}
      IMAGE_QUALITY: ${IMAGE_QUALITY:-88}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - adk_network

  frontend:
    build: *frontend_build
    container_name: adk-frontend-prod
    restart: on-failure:5
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adk_network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: adk-prometheus-prod
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - adk_network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: adk-grafana-prod
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - adk_network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  adk_network:
    driver: bridge